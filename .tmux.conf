set-option -g default-shell /usr/local/bin/zsh

set -g prefix ^a
set -g status-bg black
set -g status-fg white

bind s source-file ~/.tmux.conf

unbind-key h
bind h split-window -h -c "#{pane_current_path}"

unbind-key v
bind v split-window -v -c "#{pane_current_path}"

setw -g automatic-rename

#set -g window-style 'fg=black,bg=colour254'
#set -g window-active-style 'fg=black,bg=colour255'

set -g pane-border-fg colour0
set -g pane-border-bg colour254
set -g pane-active-border-fg red
set -g pane-active-border-bg colour254

# interedting : https://zserge.com/posts/tmux/
